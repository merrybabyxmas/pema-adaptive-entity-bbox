seed: 42

paths:
  train_jsonl: data/splits/train.jsonl
  val_jsonl: data/splits/val.jsonl
  output_dir: outputs/runs/bbox_planner_v5_clean

model:
  arch: planner           # planner | mlp_baseline
  d_text: 512             # CLIP ViT-B-32 output dim
  d_model: 256
  num_layers: 4
  num_heads: 8
  dropout: 0.1
  text_encoder: clip_vitb32
  freeze_text_encoder: true

training:
  epochs: 50
  batch_size: 64
  num_workers: 4
  lr: 1.0e-4
  weight_decay: 1.0e-4
  grad_clip: 1.0
  mixed_precision: true
  max_shots: 5
  max_entities: 5

loss:
  # Clean 2-objective formulation (AAAI):  L = L_box + lambda_depth * L_depth
  #   L_box = lambda_l1 * L1 + lambda_giou * GIoU   (one layout-reconstruction objective)
  #   L_depth = pairwise occlusion-order ranking
  # overlap/temporal losses removed: overlap/fusion is handled at generation time
  # (resolve_for_occlusion + apply_depth_occlusion), temporal continuity comes from
  # state embedding + same-entity temporal attention (architecture, not a loss).
  lambda_l1: 1.0
  lambda_giou: 1.0
  lambda_depth: 1.0
  depth_margin: 0.1

eval:
  eval_every: 1
  save_every: 5
